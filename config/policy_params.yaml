# --- Section 301 product lists (blanket coverage) ---
# Products covered by 301 are defined by US Note 20/21/31 product lists,
# NOT by individual product footnotes. Sourced from USITC "China Tariffs"
# reference document (hts.usitc.gov). China only (Census code 5700).
section_301_products:
  resource_file: 'resources/s301_product_lists.csv'
  country: '5700'

# --- Section 232 derivative products ---
# Aluminum-containing articles outside chapter 76 (US Note 19 subdivisions i/j/k)
# covered by 9903.85.04/.07/.08. Product list not extractable from HTS JSON.
section_232_derivatives:
  resource_file: 'resources/s232_derivative_products.csv'
  default_rate: 0.25    # same as base aluminum rate

# --- Metal content shares for 232 derivatives ---
# The tariff on derivative products applies only to the metal content portion
# of customs value. Three methods for estimating metal share:
#   flat: uniform share for all derivatives (default 50%, matches TPC)
#   cbo:  product-level buckets from CBO files (high=0.75, low=0.25, copper=0.90)
#   bea:  sector-level shares from BEA I-O tables (future)
metal_content:
  method: 'flat'         # 'flat', 'cbo', or 'bea'
  flat_share: 0.50       # default 50% to match TPC
  primary_chapters: ['72', '73', '76']  # products in these chapters = 100% metal
  # CBO method params (used when method = 'cbo'):
  # cbo_high_share: 0.75
  # cbo_low_share: 0.25
  # cbo_copper_share: 0.90

# --- Fentanyl product carve-outs ---
# Product-specific fentanyl rate carve-outs for CA/MX.
# These entries in 9903.01.01-24 assign a lower rate to specific product
# categories instead of the general blanket rate:
#   9903.01.13 (CA): Energy, minerals, critical minerals → +10% (vs +35%)
#   9903.01.15 (CA): Potash → +10% (vs +35%)
#   9903.01.05 (MX): Potash → +10% (vs +25%)
# Product lists sourced from Tariff-ETRs config (US Note 2 subdivisions).
fentanyl_carveouts:
  resource_file: 'resources/fentanyl_carveout_products.csv'

# --- Countries excluded from TPC validation ---
# These countries have legitimate IEEPA entries in the HTS JSON, but TPC
# doesn't model them. Excluded from validation comparisons to avoid
# false-positive discrepancies (~95K product-country pairs).
tpc_excluded_countries:
  - '5020'   # Syria
  - '4641'   # Moldova
  - '5530'   # Laos
  - '3720'   # Falkland Islands
  - '7660'   # DR Congo

# --- IEEPA reciprocal: duty-free product treatment ---
# Whether to apply IEEPA reciprocal tariffs to products with 0% MFN base rate.
# TPC excludes these; legal text supports either interpretation.
#   'all' = apply to all products (current default, legally strict)
#   'nonzero_base_only' = skip duty-free products (matches TPC methodology)
ieepa_duty_free_treatment: 'all'

# --- Validation thresholds ---
validation_thresholds:
  exact: 0.005
  within_2pp: 0.02
  within_5pp: 0.05
