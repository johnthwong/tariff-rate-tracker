# --- Section 232 covered product prefixes ---
# Prefix matching: '72' matches all HTS10 starting with 72, '8703' matches 8703xxxx, etc.
# Products are also captured via footnote mechanism; this is the blanket backup.
section_232_chapters:
  steel: ['72', '73']
  aluminum: ['76']

# Additional 232 tariffs beyond steel/aluminum (9903.94 auto tariffs, copper, etc.)
# These use HTS heading/subheading prefixes rather than full chapter coverage.
section_232_headings:
  autos_passenger:
    prefixes: ['870322', '870323', '870324', '870331', '870332', '870333',
               '870334', '870340', '870350', '870360', '870370', '870380', '870390']
    default_rate: 0.25
    usmca_exempt: true
  autos_light_trucks:
    prefixes: ['87042101', '87043101', '87044100', '87045100']
    default_rate: 0.25
    usmca_exempt: true
  copper:
    prefixes: ['7406', '7407', '7408', '7409', '7410', '7411', '7412', '7413',
               '7415', '7418', '7419']
    default_rate: 0.25
    usmca_exempt: false

